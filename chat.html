<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - TutorLink Bangladesh</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="logo">
            <i class="fas fa-crown"></i>
            <span>TutorLink <span class="gold-text">Bangladesh</span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#tutors">Find Tutors</a></li>
            <li><a href="messages.html">Messages</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <div class="auth-buttons" id="authButtons"></div>
    </nav>

    <section class="chat-section">
        <div class="chat-container glass">
            <div class="chat-header">
                <a href="messages.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
                <div class="chat-user">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <h3 id="chatUserName">Loading...</h3>
                        <p id="chatUserStatus">Online</p>
                    </div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be loaded here -->
            </div>
            
            <div class="chat-input">
                <textarea id="chatInput" placeholder="Type your message..." rows="2"></textarea>
                <button onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        let otherUserEmail = '';
        let otherUserName = '';

        function loadMessages() {
            const urlParams = new URLSearchParams(window.location.search);
            otherUserEmail = urlParams.get('email');
            otherUserName = urlParams.get('name');
            
            if (!otherUserEmail) {
                window.location.href = 'messages.html';
                return;
            }
            
            document.getElementById('chatUserName').textContent = otherUserName;
            
            const messages = JSON.parse(localStorage.getItem('messages')) || [];
            const myMessages = messages.filter(m => 
                (m.from === currentUser.email && m.to === otherUserEmail) ||
                (m.from === otherUserEmail && m.to === currentUser.email)
            ).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            messages.forEach(m => {
                if (m.from === otherUserEmail && m.to === currentUser.email && !m.read) {
                    m.read = true;
                }
            });
            localStorage.setItem('messages', JSON.stringify(messages));
            
            const container = document.getElementById('chatMessages');
            if (myMessages.length === 0) {
                container.innerHTML = '<div class="no-messages"><i class="fas fa-comment-dots"></i><p>No messages yet. Start the conversation!</p></div>';
                return;
            }
            
            container.innerHTML = myMessages.map(msg => `
                <div class="message ${msg.from === currentUser.email ? 'sent' : 'received'}">
                    <div class="message-content">
                        <p>${msg.content}</p>
                        <small>${new Date(msg.timestamp).toLocaleTimeString()}</small>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const content = document.getElementById('chatInput').value.trim();
            if (!content) return;
            
            const messages = JSON.parse(localStorage.getItem('messages')) || [];
            messages.push({
                id: Date.now(),
                from: currentUser.email,
                fromName: currentUser.name,
                to: otherUserEmail,
                toName: otherUserName,
                content: content,
                timestamp: new Date().toISOString(),
                read: false
            });
            
            localStorage.setItem('messages', JSON.stringify(messages));
            document.getElementById('chatInput').value = '';
            loadMessages();
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            updateAuthUI();
            loadMessages();
            setInterval(loadMessages, 5000);
        });
    </script>
</body>
</html>
