<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TutorLink Bangladesh</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="nav-luxury">
        <div class="nav-container">
            <div class="logo-luxury">
                <i class="fas fa-feather-alt"></i>
                <span>TutorLink <span class="gold">Bangladesh</span></span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#tutors">Find Tutors</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <div class="nav-auth" id="authButtons">
                <button class="btn-login" onclick="window.location.href='login.html'">Sign In</button>
                <button class="btn-register" onclick="window.location.href='register.html'">Join Now</button>
            </div>
        </div>
    </nav>

    <section class="register-section">
        <div class="register-container">
            <div class="register-header">
                <div class="register-icon">✨</div>
                <h2>Create Account</h2>
                <p>Join the TutorLink Bangladesh community</p>
            </div>
            <form id="registerForm" onsubmit="event.preventDefault(); register()">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" placeholder="Choose a password" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> I am a</label>
                    <select id="regType" required>
                        <option value="student">Student looking for tutor</option>
                        <option value="tutor">Tutor offering services</option>
                    </select>
                </div>
                <button type="submit" class="btn-register-submit">Create Account</button>
                <p class="register-footer">Already have an account? <a href="login.html">Sign In</a></p>
            </form>
        </div>
    </section>

    <footer class="footer-luxury">
        <div class="footer-content">
            <div class="footer-brand">
                <i class="fas fa-feather-alt"></i>
                <span>TutorLink Bangladesh</span>
                <p>Where excellence meets education</p>
            </div>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
